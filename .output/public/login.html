<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Osiris | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .glass-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
            transition: all 0.2s;
        }
        .btn-primary:active {
            transform: translateY(2px);
        }
        .pixel-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #3f4a3c 50%, transparent 100%);
            position: relative;
        }
        .mc-input {
            caret-color: #78dc77;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline-variant": "#3f4a3c",
                        "surface-container-high": "#2a2a2a",
                        "surface-tint": "#78dc77",
                        "background": "#131313",
                        "on-surface-variant": "#becab9",
                        "surface": "#131313",
                        "secondary": "#4cd6fb",
                        "surface-container": "#201f1f",
                        "on-background": "#e5e2e1",
                        "tertiary": "#e9c400",
                        "on-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "on-primary": "#00390a",
                        "primary": "#78dc77",
                        "on-primary-container": "#003c0b",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed": "#94f990",
                        "outline": "#899484",
                        "on-error-container": "#ffdad6",
                        "error-container": "#93000a",
                        "error": "#ffb4ab"
                    },
                    fontFamily: {
                        "headline-lg": ["Outfit"],
                        "label-md": ["JetBrains Mono"],
                        "body-md": ["Inter"],
                        "headline-xl": ["Outfit"],
                        "body-lg": ["Inter"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-primary/30">
<nav class="fixed top-0 w-full z-50 bg-surface-dim/80 backdrop-blur-xl border-b border-white/10">
<div class="flex justify-between items-center max-w-[1440px] mx-auto px-container-padding h-20">
<div class="font-headline-xl text-headline-xl text-primary tracking-tighter uppercase">Osiris</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md" href="/home.html">Home</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md" href="/marketplace.html">Marketplace</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md" href="/store.html">Store</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md" href="/profile.html">Dashboard</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md" href="/leaderboards.html">Leaderboards</a>
</div>
<div class="flex items-center gap-4">
<button class="bg-primary px-6 py-2 rounded-lg font-headline-lg text-sm text-on-primary uppercase tracking-wider active:translate-y-[2px] transition-transform shadow-[0_0_15px_rgba(76,175,80,0.4)]">Play Now</button>
</div>
</div>
</nav>
<main class="flex-1 flex items-center justify-center px-4 pt-32 pb-20">
<div class="w-full max-w-md">
<div class="glass-card rounded-[24px] p-card-padding">
<div class="text-center mb-8">
<div class="w-16 h-16 bg-primary/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-2">Welcome to Osiris</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Login with your Minecraft account</p>
</div>
<div id="login-form">
<div class="space-y-4 mb-6">
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-2 uppercase tracking-widest">Minecraft Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input id="username-input" class="mc-input w-full bg-surface-container-high border border-outline-variant rounded-xl py-3 pl-12 pr-4 text-on-surface font-label-md focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="Enter your Minecraft username" type="text" maxlength="16" autocomplete="off"/>
</div>
<p id="username-error" class="text-error text-sm mt-2 hidden font-label-md"></p>
</div>
<button id="login-btn" class="btn-primary w-full py-4 rounded-xl font-headline-lg text-on-primary uppercase font-bold tracking-widest flex items-center justify-center gap-2 transition-all" onclick="handleLogin()">
<span class="material-symbols-outlined">login</span>
                    Login
                </button>
</div>
<div class="pixel-divider mb-6"></div>
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant mb-4">Or login with Microsoft</p>
<button id="ms-login-btn" class="w-full py-4 rounded-xl border-2 border-white/20 text-on-surface font-headline-lg uppercase tracking-widest hover:bg-white/5 transition-all flex items-center justify-center gap-3" onclick="handleMicrosoftLogin()">
<svg class="w-5 h-5" viewBox="0 0 23 23" fill="none">
<rect x="1" y="1" width="10" height="10" fill="#F25022"/>
<rect x="12" y="1" width="10" height="10" fill="#7FBA00"/>
<rect x="1" y="12" width="10" height="10" fill="#00A4EF"/>
<rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
</svg>
                    Microsoft Account
                </button>
</div>
</div>
<div id="logged-in-view" class="hidden text-center">
<div class="w-24 h-24 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
<img id="player-head" class="w-20 h-20 rounded-xl" src="" alt="Player head"/>
</div>
<h2 id="display-name" class="font-headline-lg text-headline-lg text-on-surface mb-2"></h2>
<p id="display-uuid" class="font-label-sm text-label-sm text-on-surface-variant mb-6"></p>
<div class="flex gap-3">
<a href="/profile.html" class="btn-primary flex-1 py-4 rounded-xl font-headline-lg text-on-primary uppercase font-bold tracking-widest text-center">Dashboard</a>
<button onclick="handleLogout()" class="flex-1 py-4 rounded-xl border border-outline-variant text-on-surface font-headline-lg uppercase tracking-widest hover:bg-white/5 transition-all">Logout</button>
</div>
</div>
</div>
</div>
</main>
<script>
        const MC_API = 'https://api.mojang.com/users/profiles/minecraft';

        function getStoredSession() {
            const session = localStorage.getItem('osiris_session');
            return session ? JSON.parse(session) : null;
        }

        function setSession(username, uuid) {
            localStorage.setItem('osiris_session', JSON.stringify({ username, uuid, loggedInAt: Date.now() }));
        }

        function clearSession() {
            localStorage.removeItem('osiris_session');
        }

        async function handleLogin() {
            const input = document.getElementById('username-input');
            const errorEl = document.getElementById('username-error');
            const loginBtn = document.getElementById('login-btn');
            const username = input.value.trim();

            errorEl.classList.add('hidden');
            if (!username) {
                errorEl.textContent = 'Please enter a Minecraft username';
                errorEl.classList.remove('hidden');
                return;
            }
            if (username.length < 3 || username.length > 16) {
                errorEl.textContent = 'Username must be 3-16 characters';
                errorEl.classList.remove('hidden');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Verifying...';

            try {
                const response = await fetch(`${MC_API}/${encodeURIComponent(username)}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Minecraft username not found. Check the spelling.');
                    }
                    throw new Error('Could not verify username. Try again later.');
                }
                const data = await response.json();
                const uuid = data.id;
                const formattedUuid = uuid.replace(/(\w{8})(\w{4})(\w{4})(\w{4})(\w{12})/, '$1-$2-$3-$4-$5');

                setSession(data.name, formattedUuid);
                showLoggedInView(data.name, formattedUuid);
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span class="material-symbols-outlined">login</span> Login';
            }
        }

        function handleMicrosoftLogin() {
            const errorEl = document.getElementById('username-error');
            errorEl.textContent = 'Microsoft login is coming soon! Use your Minecraft username for now.';
            errorEl.classList.remove('hidden');
            errorEl.classList.remove('text-error');
            errorEl.classList.add('text-tertiary');
        }

        function handleLogout() {
            clearSession();
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }

        function showLoggedInView(username, uuid) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');
            document.getElementById('display-name').textContent = username;
            document.getElementById('display-uuid').textContent = 'UUID: ' + uuid;
            document.getElementById('player-head').src = 'https://minotar.net/avatar/' + username + '/100';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const session = getStoredSession();
            if (session) {
                showLoggedInView(session.username, session.uuid);
            }
            const input = document.getElementById('username-input');
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
        });
    </script>
</body></html>
